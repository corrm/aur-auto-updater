pkgname: 3dgenstudio-git
aur_repo: 3dgenstudio-git
arch: [x86_64]
pkgdesc: "AI image-to-3D model generation studio (Vite UI + Node/Python backend)"
url: https://github.com/visualbruno/3DGenStudio
license: [custom]

depends: [nodejs, xdg-utils]
optdepends:
  - "python: local 3D-generation backend (python-server)"
conflicts: [3dgenstudio]
provides: [3dgenstudio]

upstream:
  provider: git
  url: https://github.com/visualbruno/3DGenStudio.git
  branch: main

type: actions
steps:
  - uses: git-source
    name: Fetch source
    with:
      url: https://github.com/visualbruno/3DGenStudio.git
      ref: main
  - uses: npm-build
    name: Production build (vite build -> dist/)
    with:
      build_script: build
  - run: |
      cd "$srcdir/3dgenstudio-git"
      npm prune --omit=dev
    name: Strip devDependencies from node_modules
    phase: build
  - run: |
      cd "$srcdir/3dgenstudio-git"
      install -d "$pkgdir/opt/3dgenstudio-git"
      cp -a --no-target-directory . "$pkgdir/opt/3dgenstudio-git"
      # Keep the production build + server; drop dev source, tooling, VCS, secrets.
      cd "$pkgdir/opt/3dgenstudio-git"
      rm -rf .git .env src public .github .vscode .claude .gitignore \
             vite.config.* eslint.config.js tsconfig*.json
    name: Install production tree
    phase: package
  - uses: install-launcher
    name: Install launcher
    with:
      name: 3dgenstudio
      script: |
        #!/bin/bash
        # Starts the production server (serves the built dist/ UI + APIs) and opens it
        # in the browser. If it's already running, just opens the browser. App data
        # (sqlite, assets) is written under process.cwd()/data — a per-user writable dir.
        app=/opt/3dgenstudio-git
        data="${XDG_DATA_HOME:-$HOME/.local/share}/3dgenstudio"
        port="${PORT:-3001}"
        url="http://localhost:$port"
        mkdir -p "$data"
        cd "$data"
        _up() { (exec 3<>"/dev/tcp/127.0.0.1/$port") 2>/dev/null; }
        if _up; then exec xdg-open "$url"; fi
        ( for _ in $(seq 1 50); do _up && { xdg-open "$url"; break; }; sleep 0.2; done ) &
        echo "3dgenstudio: starting on $url"
        exec node "$app/server.js"
  - uses: desktop-entry
    name: Install menu entry + icon
    with:
      name: 3dgenstudio
      title: 3D Gen Studio
      exec: 3dgenstudio
      comment: AI image-to-3D model generation studio
      categories: "Graphics;3DGraphics;"
      icon_source: dist/favicon.png
      icon_size: 128x128
