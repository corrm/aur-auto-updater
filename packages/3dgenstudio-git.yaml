pkgname: 3dgenstudio-git
aur_repo: 3dgenstudio-git
arch: [x86_64]
pkgdesc: "AI image-to-3D model generation studio (Vite UI + Node/Python backend)"
url: https://github.com/visualbruno/3DGenStudio
license: [custom]

depends: [nodejs]
optdepends:
  - "python: local 3D-generation backend (python-server)"
conflicts: [3dgenstudio]
provides: [3dgenstudio]

upstream:
  provider: git
  url: https://github.com/visualbruno/3DGenStudio.git
  branch: main

type: actions
steps:
  - uses: git-source
    name: Fetch source
    with:
      url: https://github.com/visualbruno/3DGenStudio.git
      ref: main
  - uses: npm-build
    name: Production build (vite build -> dist/)
    with:
      build_script: build
  - run: |
      cd "$srcdir/3dgenstudio-git"
      npm prune --omit=dev
    name: Strip devDependencies from node_modules
    phase: build
  - run: |
      cd "$srcdir/3dgenstudio-git"
      install -d "$pkgdir/opt/3dgenstudio-git"
      cp -a --no-target-directory . "$pkgdir/opt/3dgenstudio-git"
      # Keep the production build + server; drop dev source, tooling, VCS, secrets.
      cd "$pkgdir/opt/3dgenstudio-git"
      rm -rf .git .env src public .github .vscode .claude .gitignore \
             vite.config.* eslint.config.js tsconfig*.json
    name: Install production tree
    phase: package
  - uses: install-launcher
    name: Install launcher
    with:
      name: 3dgenstudio
      script: |
        #!/bin/bash
        # Runs the production server (server.js): serves the built dist/ UI + APIs
        # on http://localhost:${PORT:-3001}. App data (sqlite, assets) is written
        # under process.cwd()/data, so run from a per-user writable directory.
        set -e
        app=/opt/3dgenstudio-git
        data="${XDG_DATA_HOME:-$HOME/.local/share}/3dgenstudio"
        mkdir -p "$data"
        cd "$data"
        echo "3dgenstudio: open http://localhost:${PORT:-3001}"
        exec node "$app/server.js"
