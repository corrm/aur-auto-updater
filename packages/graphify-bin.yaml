aur_repo: graphify-bin
pkgname: graphify-bin
pkgdesc: AI coding assistant skill - turn any folder into a queryable knowledge graph
url: https://graphify.net
arch: [x86_64, aarch64]
license: [MIT]

depends: ["python>=3.10"]
makedepends: ["python-build", "python-installer", "python-wheel", "python-setuptools"]

upstream:
  provider: pypi
  pypi_name: graphifyy

type: pypi
pypi:
  package_manager: pip

provides:
  - graphify

install_files:
  - source: LICENSE
    dest: /usr/share/licenses/graphify-bin
    mode: "644"
  - source: README.md
    dest: /usr/share/doc/graphify-bin
    mode: "644"
