aur_repo: superset-bin
pkgname: superset-bin
pkgdesc: Code Editor for the AI Agents Era - Run an army of Claude Code, Codex, etc. on your machine
url: https://superset.sh
arch: [x86_64]
license: [custom]
conflicts:
  - superset-desktop-bin

depends:
  - "fuse2"
  - "hicolor-icon-theme"

upstream:
  provider: github
  repo: superset-sh/superset
  asset_regex: ".*-${arch}.AppImage$"

type: appimage
appimage:
  appimage_name: "superset-${pkgver}-${arch}.AppImage"
  binary_name: superset-desktop
  desktop: true
  icons: true
