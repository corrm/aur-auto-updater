name: Python Tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-scripts.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-scripts.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Create venv and install deps
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install pytest pyyaml requests jsonschema jinja2

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v

      - name: Validate Python syntax
        run: |
          source .venv/bin/activate
          python -m py_compile scripts/*.py

      - name: Type check with ty
        run: |
          uvx ty check scripts/ || echo "ty check skipped"
