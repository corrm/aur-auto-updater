name: Run Tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-scripts.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-scripts.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-default-python: true

      - name: Install Python and dependencies
        run: |
          uv pip install pytest pyyaml requests jsonschema jinja2

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Validate Python syntax
        run: |
          python -m py_compile scripts/*.py

      - name: Type check with ty
        run: |
          uvx ty check scripts/ || echo "ty check skipped"
