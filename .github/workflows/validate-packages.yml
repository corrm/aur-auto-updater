name: Validate Package YAML

on:
  push:
    paths:
      - 'packages/**'
      - 'schema/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'schema/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-default-python: true

      - name: Install deps
        run: uv pip install pyyaml jsonschema

      - name: Validate package YAML files
        run: python scripts/validate.py