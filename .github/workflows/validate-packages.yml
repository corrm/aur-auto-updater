name: Validate Package YAML

on:
  push:
    paths:
      - 'packages/**'
      - 'schema/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'schema/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: pip install pyyaml jsonschema

      - name: Validate package YAML files
        run: python scripts/validate.py
