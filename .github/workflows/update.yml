name: aur-autosync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed git base-devel openssh python python-pip

      - name: Configure Git
        run: |
          git config --global user.name "Islam Nofl"
          git config --global user.email "islamnofl.official@gmail.com"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          # Also setup SSH for GitHub (for pushing state if needed)
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: pip install pyyaml requests jinja2

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Run sync
        run: python scripts/run_all.py

      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: report
          path: report.json