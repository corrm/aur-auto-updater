name: aur-autosync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      image: archlinux
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed sudo git base-devel openssh python python-pip

      - name: Configure Git
        run: |
          git config --global user.name "Islam Nofl"
          git config --global user.email "islamnofl.official@gmail.com"

      # SSH key permissions / ownership in containers
      # Inside a GitHub Actions container, the home directory can be /root but sometimes the runner mounts things oddly. Be explicit
      - name: Setup SSH for AUR
        run: |
          mkdir -p /root/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/id_ed25519
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> /root/.ssh/known_hosts
          ssh-keyscan github.com >> /root/.ssh/known_hosts
          # Create SSH config file for AUR (following KSXGitHub/github-actions-deploy-aur pattern)
          cat > /root/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            User aur
          EOF
          chmod 600 /root/.ssh/config

      - name: Install deps
        run: sudo pip install pyyaml requests jinja2 --break-system-packages

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Run sync
        run: python scripts/run_all.py

      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: report
          path: report.json