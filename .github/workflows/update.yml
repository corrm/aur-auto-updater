name: AUR Autosync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      image: archlinux
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed sudo git base-devel openssh python python-pip

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python deps
        run: |
          uv pip install --system --break-system-packages pyyaml requests jinja2

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Configure Git
        run: |
          git config --global user.name "Islam Nofl"
          git config --global user.email "islamnofl.official@gmail.com"
          sudo -u builder git config --global user.name "Islam Nofl"
          sudo -u builder git config --global user.email "islamnofl.official@gmail.com"

      - name: Setup SSH for AUR
        run: |
          mkdir -p /home/builder/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /home/builder/.ssh/id_ed25519
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/id_ed25519
          chown -R builder:builder /home/builder/.ssh
          ssh-keyscan aur.archlinux.org >> /home/builder/.ssh/known_hosts
          ssh-keyscan github.com >> /home/builder/.ssh/known_hosts
          cat > /home/builder/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            User aur
          EOF
          chmod 600 /home/builder/.ssh/config
          chown -R builder:builder /home/builder/.ssh/config

      - name: Fix permissions
        run: |
          sudo chown -R builder:builder /__w/aur-auto-updater/aur-auto-updater
          sudo chmod -R u+rw /__w/aur-auto-updater/aur-auto-updater

      - name: Restore state cache
        uses: actions/cache@v5
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Fix permissions
        run: sudo chown -R builder:builder /__w/aur-auto-updater/aur-auto-updater

      - name: Run sync
        run: sudo -u builder python scripts/run_all.py

      - name: Save state cache
        uses: actions/cache@v5
        with:
          path: state
          key: ${{ runner.os }}-aur-state-${{ hashFiles('packages/*.yaml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-aur-state-

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: report
          path: report.json