name: aur-autosync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name "Islam Nofl"
          git config --global user.email "islamnofl.official@gmail.com"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: pip install pyyaml requests jinja2

      - name: Run sync
        run: python scripts/run_all.py

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: report
          path: report.json